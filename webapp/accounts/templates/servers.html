{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servers</title>
    <link rel="stylesheet" href="{% static 'css/servers.css' %}">
</head>
<body>
    <div class="sidebar">
        <div class="logo">Monitor API</div>
        <div class="menu">
            <a href="/">Home</a>
            <a href="/dashboard/">Dashboard</a>
            <a href="#" class="active">Servers</a>
            <a href="/dashboard/#metricsPage" id="metricsMenuBtn">Metrics</a>
            <a href="#">Settings</a>
            <a href="/logout/">Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <div>
                <h1>Servers</h1>
                <p>Manage your monitored servers</p>
            </div>
            <button id="addServerBtn">+ Add Server</button>
        </div>

        <div class="server-list">
            <div class="server-row header">
                <span>Hostname</span>
                <span>IP Address</span>
                <span>Status</span>
                <span>Actions</span>
            </div>
            <div id="serverContainer"></div>
        </div>
    </div>

    <div id="serverModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2>Add New Server</h2>
                <button class="close-btn" onclick="document.getElementById('serverModal').style.display='none'">×</button>
            </div>
            <form id="serverForm">
                <input type="text" id="hostname" placeholder="Hostname" required>
                <input type="text" id="ipaddress" placeholder="IP Address" required>
                <input type="text" id="os" placeholder="OS" required>
                <button type="submit">Add Server</button>
            </form>
        </div>
    </div>

    <div id="logsModal" class="modal">
        <div class="modal-content logs-modal">
            <div class="modal-header">
                <h2 id="logsServerName">Recent Logs</h2>
                <button class="close-btn" onclick="document.getElementById('logsModal').style.display='none'">×</button>
            </div>
            <div id="logsContainer" class="logs-container"></div>
        </div>
    </div>

    <script src="{% static 'js/servers.js' %}"></script>
</body>
</html>
